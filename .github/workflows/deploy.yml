name: Deploy Worker
on:
  push:
    branches:
      - main
      - develop # Tên nhánh thật của mầy là develop, không phải dev
    paths:
      - ".github/workflows/deploy.yml" # Cho phép trigger khi sửa chính file workflow này
      - "apps/web/**" # Vẫn giữ rule chỉ build khi có code web thay đổi
      - "packages/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install

      - name: Build Next.js for Cloudflare (OpenNext)
        run: pnpm run build:cf
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SERVER_URL: ${{ github.ref == 'refs/heads/main' && 'https://cms.dounus.id.vn' || 'https://cms-dev.dounus.id.vn' }}

      # -----------------------------------------------------------------
      # DEPLOY CHO NHÁNH DEVELOP (Môi trường test)
      # -----------------------------------------------------------------
      - name: Deploy with Wrangler (Dev)
        if: github.ref == 'refs/heads/develop' # Chỉ chạy step này nếu push lên nhánh develop
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env dev
          workingDirectory: "apps/web"

      # -----------------------------------------------------------------
      # DEPLOY CHO NHÁNH MAIN (Môi trường production)
      # -----------------------------------------------------------------
      - name: Deploy with Wrangler (Production)
        if: github.ref == 'refs/heads/main' # Chỉ chạy step này nếu push lên nhánh main
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production
          workingDirectory: "apps/web"

      # -----------------------------------------------------------------
      # GỬI EMAIL THÔNG BÁO KHI SUCCESS
      # -----------------------------------------------------------------
      - name: Send Notification Email (Success)
        if: success()
        run: |
          jq -n \
            --arg to_raw "${{ secrets.NOTIFY_EMAIL }}" \
            --arg subject "✅ [BDS-Web] Deploy Thành Công (${{ github.ref == 'refs/heads/main' && 'PROD' || 'DEV' }})" \
            --arg html "<h2>Trạng thái Deploy: Thành Công</h2><p>Dự án BDS (Web) vừa được deploy <b style='color: green;'>THÀNH CÔNG</b> lên Cloudflare.</p><br/><ul><li><b>Môi trường:</b> ${{ github.ref == 'refs/heads/main' && '🚀 PRODUCTION' || '🧪 DEVELOPMENT' }}</li><li><b>Nhánh:</b> ${{ github.ref_name }}</li><li><b>Commit:</b> ${{ github.sha }}</li><li><b>Người Push:</b> ${{ github.actor }}</li><li><b>Chi tiết Log:</b> <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Xem tại đây</a></li></ul>" \
            '{to: ($to_raw | split(",")), subject: $subject, html: $html}' > mail.json
          
          curl -X POST https://node-smtp.dounus.id.vn/send \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SMTP_API_TOKEN }}" \
            -d @mail.json

      - name: Send Notification Email (Failure)
        if: failure()
        run: |
          jq -n \
            --arg to_raw "${{ secrets.NOTIFY_EMAIL }}" \
            --arg subject "❌ [BDS-Web] Deploy Thất Bại (${{ github.ref == 'refs/heads/main' && 'PROD' || 'DEV' }})" \
            --arg html "<h2>Trạng thái Deploy: Thất Bại</h2><p>Dự án BDS (Web) deploy <b style='color: red;'>THẤT BẠI</b> lên Cloudflare. Vào check log gấp!</p><br/><ul><li><b>Môi trường:</b> ${{ github.ref == 'refs/heads/main' && '🚀 PRODUCTION' || '🧪 DEVELOPMENT' }}</li><li><b>Nhánh:</b> ${{ github.ref_name }}</li><li><b>Commit:</b> ${{ github.sha }}</li><li><b>Người Push:</b> ${{ github.actor }}</li><li><b>Chi tiết Log:</b> <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Xem tại đây</a></li></ul>" \
            '{to: ($to_raw | split(",")), subject: $subject, html: $html}' > mail.json
          
          curl -X POST https://node-smtp.dounus.id.vn/send \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SMTP_API_TOKEN }}" \
            -d @mail.json
