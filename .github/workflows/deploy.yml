name: Deploy Worker
on:
  push:
    branches:
      - main
      - develop # Tên nhánh thật của mầy là develop, không phải dev
    paths:
      - ".github/workflows/deploy.yml" # Cho phép trigger khi sửa chính file workflow này
      - "apps/web/**" # Vẫn giữ rule chỉ build khi có code web thay đổi
      - "packages/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install

      - name: Build Next.js for Cloudflare (OpenNext)
        run: pnpm run build:cf
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SERVER_URL: ${{ github.ref == 'refs/heads/main' && 'https://cms.dounus.id.vn' || 'https://cms-dev.dounus.id.vn' }}

      # -----------------------------------------------------------------
      # DEPLOY CHO NHÁNH DEVELOP (Môi trường test)
      # -----------------------------------------------------------------
      - name: Deploy with Wrangler (Dev)
        if: github.ref == 'refs/heads/develop' # Chỉ chạy step này nếu push lên nhánh develop
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env dev
          workingDirectory: "apps/web"

      # -----------------------------------------------------------------
      # DEPLOY CHO NHÁNH MAIN (Môi trường production)
      # -----------------------------------------------------------------
      - name: Deploy with Wrangler (Production)
        if: github.ref == 'refs/heads/main' # Chỉ chạy step này nếu push lên nhánh main
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production
          workingDirectory: "apps/web"

      # -----------------------------------------------------------------
      # GỬI EMAIL THÔNG BÁO KHI SUCCESS
      # -----------------------------------------------------------------
      - name: Send Notification Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ [BDS-Web] Deploy Thành Công (${{ github.ref == 'refs/heads/main' && 'PROD' || 'DEV' }})"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "BDS GitHub Actions <${{ secrets.SMTP_USERNAME }}>"
          body: |
            Báo cáo đại ca: 
            Dự án BDS (Web) vừa được build và deploy THÀNH CÔNG lên Cloudflare!
            
            - Môi trường: ${{ github.ref == 'refs/heads/main' && '🚀 PRODUCTION' || '🧪 DEVELOPMENT' }}
            - Nhánh: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Người Push: ${{ github.actor }}
            - Link Log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Chúc đại ca code vui vẻ, ít bug!
