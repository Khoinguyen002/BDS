name: Deploy CMS to VPS
on:
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/deploy-cms.yml" # Cho phép trigger khi sửa chính file workflow này
      # Chỉ trigger deploy CMS nếu có thay đổi trong thư mục cms hoặc packages dùng chung
      - "apps/cms/**"
      - "packages/**"

jobs:
  deploy-vps:
    runs-on: ubuntu-latest
    steps:
      # -----------------------------------------------------------------
      # DEPLOY CMS CHO NHÁNH DEVELOP
      # -----------------------------------------------------------------
      - name: Deploy CMS (Dev)
        if: github.ref == 'refs/heads/develop'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }} # Tuỳ chọn, mặc định là 22
          script: |
            set -e # ⚠️ Cực kỳ quan trọng: Lệnh này giúp script DỪNG NGAY LẬP TỨC nếu có bất kỳ lệnh nào ở dưới bị lỗi (như build fail)

            cd ~/dev-bds/BDS

            # Pull code mới nhất
            git pull origin develop

            # Cài dependency và build
            pnpm install
            pnpm --filter cms build

            pm2 restart bds-cms-dev

      # -----------------------------------------------------------------
      # DEPLOY CMS CHO NHÁNH MAIN
      # -----------------------------------------------------------------
      - name: Deploy CMS (Production)
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            cd ~/BDS

            # Pull code mới nhất
            git pull origin main

            # Cài dependency và build
            pnpm install
            pnpm --filter cms build

            pm2 restart bds-cms-prod

      # -----------------------------------------------------------------
      # GỬI EMAIL THÔNG BÁO KHI SUCCESS
      # -----------------------------------------------------------------
      - name: Send Notification Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ [BDS-CMS] Deploy Thành Công (${{ github.ref == 'refs/heads/main' && 'PROD' || 'DEV' }})"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "BDS GitHub Actions <${{ secrets.SMTP_USERNAME }}>"
          body: |
            Báo cáo đại ca: 
            Dự án BDS (CMS/Backend) vừa được build và deploy THÀNH CÔNG lên VPS!
            
            - Môi trường: ${{ github.ref == 'refs/heads/main' && '🚀 PRODUCTION' || '🧪 DEVELOPMENT' }}
            - Nhánh: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Người Push: ${{ github.actor }}
            - Link Log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Chúc đại ca code vui vẻ, ít bug!
