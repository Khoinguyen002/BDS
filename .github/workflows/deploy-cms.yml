name: Deploy CMS to VPS
on:
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/deploy-cms.yml"
      - "apps/cms/**"
      - "packages/**"

jobs:
  deploy-vps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup SSH Natively
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # -----------------------------------------------------------------
      # DEPLOY CMS CHO NHÁNH DEVELOP
      # -----------------------------------------------------------------
      - name: Fetch .env & Build (Dev)
        if: github.ref == 'refs/heads/develop'
        run: |
          # Lấy .env từ VPS về Runner
          scp -P ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:~/dev-bds/BDS/apps/cms/.env apps/cms/.env
          
          # Cài dependency và build
          pnpm install
          pnpm --filter cms build

          # Nén thư mục build để gửi sang VPS (giảm thời gian transfer)
          tar -czf next-build.tar.gz apps/cms/.next

          # Gửi file nén sang VPS
          scp -P ${{ secrets.VPS_PORT || 22 }} next-build.tar.gz ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:~/dev-bds/BDS/

      - name: Apply & Restart VPS Services (Dev)
        if: github.ref == 'refs/heads/develop'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ~/dev-bds/BDS
            
            git pull origin develop
            pnpm install --prod
            
            # Xoá folder build cũ đi để tránh rác từ các bản build trước
            rm -rf apps/cms/.next
            tar -xzf next-build.tar.gz
            rm next-build.tar.gz
            
            pm2 restart bds-cms-dev

      # -----------------------------------------------------------------
      # DEPLOY CMS CHO NHÁNH MAIN
      # -----------------------------------------------------------------
      - name: Fetch .env & Build (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          scp -P ${{ secrets.VPS_PORT || 22 }} ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:~/BDS/apps/cms/.env apps/cms/.env
          
          pnpm install
          pnpm --filter cms build

          tar -czf next-build.tar.gz apps/cms/.next

          scp -P ${{ secrets.VPS_PORT || 22 }} next-build.tar.gz ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:~/BDS/

      - name: Apply & Restart VPS Services (Production)
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ~/BDS
            
            git pull origin main
            pnpm install --prod
            
            # Xoá folder build cũ đi để tránh rác từ các bản build trước
            rm -rf apps/cms/.next
            tar -xzf next-build.tar.gz
            rm next-build.tar.gz
            
            pm2 restart bds-cms-prod

      # -----------------------------------------------------------------
      # GỬI EMAIL THÔNG BÁO KHI SUCCESS
      # -----------------------------------------------------------------
      - name: Send Notification Email (Success)
        if: success()
        run: |
          jq -n \
            --arg fromName "BDS CMS Actions" \
            --arg to_raw "${{ secrets.NOTIFY_EMAIL }}" \
            --arg subject "✅ [BDS-CMS] Deploy Thành Công (${{ github.ref == 'refs/heads/main' && 'PROD' || 'DEV' }})" \
            --arg html "<h2>Trạng thái Deploy: Thành Công</h2><p>Dự án BDS (CMS/Backend) vừa được deploy <b style='color: green;'>THÀNH CÔNG</b> lên VPS.</p><br/><ul><li><b>Môi trường:</b> ${{ github.ref == 'refs/heads/main' && '🚀 PRODUCTION' || '🧪 DEVELOPMENT' }}</li><li><b>Nhánh:</b> ${{ github.ref_name }}</li><li><b>Commit:</b> ${{ github.sha }}</li><li><b>Người Push:</b> ${{ github.actor }}</li><li><b>Chi tiết Log:</b> <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Xem tại đây</a></li></ul>" \
            '{fromName: $fromName, to: ($to_raw | split(",")), subject: $subject, html: $html}' > mail.json
          
          curl -X POST https://node-smtp.dounus.id.vn/send \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SMTP_API_TOKEN }}" \
            -d @mail.json

      - name: Send Notification Email (Failure)
        if: failure()
        run: |
          jq -n \
            --arg fromName "BDS CMS Actions" \
            --arg to_raw "${{ secrets.NOTIFY_EMAIL }}" \
            --arg subject "❌ [BDS-CMS] Deploy Thất Bại (${{ github.ref == 'refs/heads/main' && 'PROD' || 'DEV' }})" \
            --arg html "<h2>Trạng thái Deploy: Thất Bại</h2><p>Dự án BDS (CMS/Backend) deploy <b style='color: red;'>THẤT BẠI</b> lên VPS. Vào check log gấp!</p><br/><ul><li><b>Môi trường:</b> ${{ github.ref == 'refs/heads/main' && '🚀 PRODUCTION' || '🧪 DEVELOPMENT' }}</li><li><b>Nhánh:</b> ${{ github.ref_name }}</li><li><b>Commit:</b> ${{ github.sha }}</li><li><b>Người Push:</b> ${{ github.actor }}</li><li><b>Chi tiết Log:</b> <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Xem tại đây</a></li></ul>" \
            '{fromName: $fromName, to: ($to_raw | split(",")), subject: $subject, html: $html}' > mail.json
          
          curl -X POST https://node-smtp.dounus.id.vn/send \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SMTP_API_TOKEN }}" \
            -d @mail.json
